<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Empanadas Chilenas 23.kiing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg-dark: #1a0f08;
    --bg-mid: #2a1810;
    --bg-warm: #3a2515;
    --gold: #c9963a;
    --gold-light: #f4d488;
    --gold-bright: #e8c87a;
    --cream: #fff8e7;
    --text-muted: #d4c0a0;
    --text-dim: #a08868;
    --wa-green: #25d366;
    --wa-green-dark: #128c4f;
  }

  html, body {
    background: var(--bg-dark);
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .container {
    max-width: 540px;
    margin: 0 auto;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(180,90,30,0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(90,40,15,0.6) 0%, transparent 60%),
      linear-gradient(180deg, #2a1810 0%, #1a0d05 50%, #120802 100%);
    min-height: 100vh;
    position: relative;
    padding-bottom: 40px;
  }

  /* Grain overlay */
  .container::before {
    content:"";
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.6 0 0 0 0 0.4 0 0 0 0 0.2 0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.4;
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 0;
  }

  .content { position: relative; z-index: 1; }

  /* Top gold bar */
  .gold-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
  }

  /* Top emblem */
  .emblem {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px 20px 8px;
  }
  .emblem .line {
    width: 50px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .emblem .label {
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  /* Title block */
  .title-block {
    text-align: center;
    padding: 12px 20px 16px;
  }
  .title-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 14vw, 88px);
    line-height: 0.88;
    color: var(--cream);
    letter-spacing: 2px;
    text-shadow: 0 4px 12px rgba(0,0,0,0.5);
  }
  .title-main .sub {
    display: block;
    background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 70%, #8a5a1a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 4px;
    margin-top: 4px;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5));
  }
  .brand {
    margin-top: 10px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(22px, 5vw, 30px);
    color: var(--cream);
  }
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 14px;
  }
  .divider .l, .divider .r {
    width: 70px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider .diamond {
    width: 7px; height: 7px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 6px rgba(201,150,58,0.6);
  }

  /* Hero photo */
  .hero {
    position: relative;
    margin: 18px 20px 24px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 18px 40px rgba(0,0,0,0.6),
      inset 0 0 0 2px rgba(201,150,58,0.5);
    aspect-ratio: 4/3;
    background: linear-gradient(180deg, #3a2515 0%, #1f1208 100%);
  }
  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Section heading */
  .section-title {
    text-align: center;
    padding: 12px 20px 16px;
  }
  .section-title .kicker {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .section-title h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(22px, 5vw, 28px);
    color: var(--gold-light);
    font-weight: 400;
  }

  /* Flavor selector */
  .flavors {
    padding: 0 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .flavor-card {
    background: rgba(40,22,10,0.85);
    border: 2px solid rgba(201,150,58,0.4);
    border-radius: 14px;
    padding: 14px 12px;
    backdrop-filter: blur(6px);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .flavor-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(244,212,136,0.12), transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .flavor-card.active {
    border-color: var(--gold);
    background: rgba(60,35,16,0.95);
    box-shadow:
      0 0 0 2px rgba(201,150,58,0.3),
      0 8px 20px rgba(0,0,0,0.4);
  }
  .flavor-card.active::before { opacity: 1; }

  .flavor-header {
    margin-bottom: 4px;
  }
  .flavor-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold-light);
    letter-spacing: 1.2px;
    line-height: 1;
  }
  .flavor-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
    margin-bottom: 12px;
    min-height: 30px;
  }

  /* Quantity selector */
  .qty-control {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.4);
    border-radius: 30px;
    padding: 4px;
    border: 1px solid rgba(201,150,58,0.3);
  }
  .qty-btn {
    width: 32px; height: 32px;
    border: none;
    background: var(--gold);
    color: var(--bg-dark);
    border-radius: 50%;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.15s;
    line-height: 1;
  }
  .qty-btn:active { transform: scale(0.9); }
  .qty-btn:disabled {
    background: rgba(201,150,58,0.25);
    color: rgba(255,255,255,0.3);
    cursor: not-allowed;
  }
  .qty-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--cream);
    min-width: 30px;
    text-align: center;
    letter-spacing: 1px;
  }

  /* Order summary */
  .summary {
    margin: 24px 20px 0;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(201,150,58,0.3);
    border-radius: 16px;
    padding: 18px;
    backdrop-filter: blur(6px);
  }
  .summary-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--gold-light);
    margin-bottom: 12px;
    text-align: center;
  }
  .summary-items {
    margin-bottom: 12px;
    min-height: 22px;
  }
  .summary-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    color: var(--text-muted);
    border-bottom: 1px dashed rgba(201,150,58,0.15);
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-item .name { color: var(--cream); }
  .summary-item .price { color: var(--gold-light); font-weight: 600; }
  .summary-empty {
    text-align: center;
    color: var(--text-dim);
    font-style: italic;
    font-size: 13px;
    padding: 8px 0;
  }
  .summary-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid rgba(201,150,58,0.4);
    margin-top: 6px;
  }
  .summary-total .label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--cream);
  }
  .summary-total .value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--gold-light);
    letter-spacing: 1px;
  }

  /* Optional note */
  .note-area {
    margin: 14px 20px 0;
  }
  .note-area label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .note-area textarea {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,150,58,0.3);
    border-radius: 12px;
    padding: 12px;
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.2s;
  }
  .note-area textarea:focus { border-color: var(--gold); }
  .note-area textarea::placeholder { color: var(--text-dim); }

  /* Order button */
  .order-btn-wrap {
    padding: 24px 20px 16px;
  }
  .order-btn {
    width: 100%;
    background: linear-gradient(180deg, var(--wa-green) 0%, var(--wa-green-dark) 100%);
    color: white;
    border: none;
    padding: 18px 24px;
    border-radius: 60px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    box-shadow:
      0 12px 28px rgba(18,140,79,0.4),
      inset 0 -3px 0 rgba(0,0,0,0.15),
      inset 0 2px 0 rgba(255,255,255,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .order-btn:active {
    transform: translateY(2px);
    box-shadow:
      0 6px 14px rgba(18,140,79,0.3),
      inset 0 -2px 0 rgba(0,0,0,0.15);
  }
  .order-btn:disabled {
    background: linear-gradient(180deg, #555 0%, #333 100%);
    box-shadow: none;
    cursor: not-allowed;
    opacity: 0.6;
  }
  .order-btn .wa-icon {
    width: 28px;
    height: 28px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .order-btn .wa-icon svg {
    width: 18px;
    height: 18px;
    fill: var(--wa-green-dark);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 12px 20px 0;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .footer .number {
    display: block;
    margin-top: 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--gold-light);
    letter-spacing: 2px;
  }

  /* Bottom bar */
  .gold-bar-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
  }

  /* Subtle reveal animation on load */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp 0.6s ease-out backwards; }
  .fade-in:nth-child(1) { animation-delay: 0.05s; }
  .fade-in:nth-child(2) { animation-delay: 0.15s; }
  .fade-in:nth-child(3) { animation-delay: 0.25s; }
  .fade-in:nth-child(4) { animation-delay: 0.35s; }

</style>
</head>
<body>

<div class="container">
  <div class="content">
    <div class="gold-bar"></div>

    <!-- Emblem -->
    <div class="emblem fade-in">
      <div class="line"></div>
      <div class="label">Auténtico Sabor Chileno</div>
      <div class="line"></div>
    </div>

    <!-- Title -->
    <div class="title-block fade-in">
      <h1 class="title-main">
        EMPANADAS
        <span class="sub">CHILENAS</span>
      </h1>
      <div class="brand">23.kiing</div>
      <div class="divider">
        <div class="l"></div>
        <div class="diamond"></div>
        <div class="r"></div>
      </div>
    </div>

    <!-- Hero photo -->
    <div class="hero fade-in">
      <img src="empanadas-hero.jpg" alt="Empanadas chilenas recién horneadas">
    </div>

    <!-- Section heading -->
    <div class="section-title fade-in">
      <div class="kicker">Haz tu pedido</div>
      <h2>Elige tus sabores</h2>
    </div>

    <!-- Flavor cards -->
    <div class="flavors" id="flavors">
      <!-- Cards inserted by JS -->
    </div>

    <!-- Optional note -->
    <div class="note-area">
      <label>📝 Nota adicional (opcional)</label>
      <textarea id="note" placeholder="Ej: sin aceituna, entrega 6pm, dirección..."></textarea>
    </div>

    <!-- Order summary -->
    <div class="summary">
      <div class="summary-title">📋 Tu Pedido</div>
      <div class="summary-items" id="summaryItems">
        <div class="summary-empty">Selecciona la cantidad de cada sabor</div>
      </div>
      <div class="summary-total">
        <span class="label">Total</span>
        <span class="value" id="totalValue">0 empanadas</span>
      </div>
    </div>

    <!-- Order button -->
    <div class="order-btn-wrap">
      <button class="order-btn" id="orderBtn" disabled>
        <span class="wa-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
          </svg>
        </span>
        <span>Enviar pedido</span>
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      Pedido directo por WhatsApp
      <span class="number">+593 98 712 6217</span>
    </div>

    <div class="gold-bar-bottom"></div>
  </div>
</div>

<script>
  // === CONFIGURACIÓN ===
  // Cambia este número si lo necesitas (formato internacional sin + ni espacios)
  const WHATSAPP_NUMBER = "593987126217";

  // Define los sabores aquí
  const FLAVORS = [
    { id: 'pino',       name: 'PINO',       desc: 'Carne, huevo, aceituna y cebolla'  },
    { id: 'pollo',      name: 'POLLO',      desc: 'Pollo desmechado al estilo casero' },
    { id: 'queso',      name: 'QUESO',      desc: 'Queso fundido cremoso y dorado'    },
    { id: 'napolitana', name: 'NAPOLITANA', desc: 'Jamón, queso y tomate'             },
  ];

  // Estado del pedido
  const order = {};
  FLAVORS.forEach(f => order[f.id] = 0);

  // Render flavor cards
  const flavorsContainer = document.getElementById('flavors');
  FLAVORS.forEach(f => {
    const card = document.createElement('div');
    card.className = 'flavor-card';
    card.dataset.id = f.id;
    card.innerHTML = `
      <div class="flavor-header">
        <div class="flavor-name">${f.name}</div>
      </div>
      <div class="flavor-desc">${f.desc}</div>
      <div class="qty-control">
        <button class="qty-btn minus" data-id="${f.id}" aria-label="Restar">−</button>
        <span class="qty-value" id="qty-${f.id}">0</span>
        <button class="qty-btn plus" data-id="${f.id}" aria-label="Sumar">+</button>
      </div>
    `;
    flavorsContainer.appendChild(card);
  });

  // Handlers
  flavorsContainer.addEventListener('click', (e) => {
    const btn = e.target.closest('.qty-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    if (btn.classList.contains('plus')) {
      order[id]++;
    } else if (btn.classList.contains('minus') && order[id] > 0) {
      order[id]--;
    }
    updateUI();
  });

  function updateUI() {
    FLAVORS.forEach(f => {
      const qtyEl = document.getElementById(`qty-${f.id}`);
      const card = flavorsContainer.querySelector(`.flavor-card[data-id="${f.id}"]`);
      const minus = card.querySelector('.minus');
      qtyEl.textContent = order[f.id];
      if (order[f.id] > 0) {
        card.classList.add('active');
        minus.disabled = false;
      } else {
        card.classList.remove('active');
        minus.disabled = true;
      }
    });

    // Update summary
    const items = FLAVORS.filter(f => order[f.id] > 0);
    const summary = document.getElementById('summaryItems');
    if (items.length === 0) {
      summary.innerHTML = '<div class="summary-empty">Selecciona la cantidad de cada sabor</div>';
    } else {
      summary.innerHTML = items.map(f => {
        return `
          <div class="summary-item">
            <span class="name">${f.name}</span>
            <span class="price">${order[f.id]} ${order[f.id] === 1 ? 'unidad' : 'unidades'}</span>
          </div>
        `;
      }).join('');
    }

    // Total quantity
    const totalQty = Object.values(order).reduce((a,b) => a+b, 0);
    document.getElementById('totalValue').textContent = `${totalQty} ${totalQty === 1 ? 'empanada' : 'empanadas'}`;

    // Enable/disable order button
    document.getElementById('orderBtn').disabled = (totalQty === 0);
  }

  // Order button - send to WhatsApp
  document.getElementById('orderBtn').addEventListener('click', () => {
    const items = FLAVORS.filter(f => order[f.id] > 0);
    if (items.length === 0) return;

    const note = document.getElementById('note').value.trim();
    const totalQty = items.reduce((sum, f) => sum + order[f.id], 0);

    let message = `¡Hola 23.kiing! 👋\n\nQuiero hacer un pedido de empanadas:\n\n`;
    items.forEach(f => {
      message += `• ${order[f.id]}× ${f.name}\n`;
    });
    message += `\n📦 Total: ${totalQty} ${totalQty === 1 ? 'empanada' : 'empanadas'}`;
    if (note) {
      message += `\n\n📝 Nota: ${note}`;
    }
    message += `\n\n¡Gracias!`;

    const encoded = encodeURIComponent(message);
    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encoded}`;
    window.open(url, '_blank');
  });

  // Init
  updateUI();
</script>

</body>
</html>
